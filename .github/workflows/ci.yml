# PR test gate for qa-systems-wrapper.
# Runs lint + unit tests (coverage gate) + an e2e boot test on every PR/push,
# and validates that the Docker image still builds (without pushing). The
# existing build-deploy.yml continues to handle the real image push + deploy
# on pushes to main — but now only code that has passed this gate reaches main.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check main.py routers/config.py tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Unit tests with coverage gate
        run: |
          pytest tests/unit \
            --cov=main --cov=routers.config \
            --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=85 --junitxml=pytest-report.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: End-to-end app boot test
        run: pytest tests/e2e -m e2e -v

  docker-build:
    # Validate the image still builds (no push — deployment stays in build-deploy.yml).
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build the Docker image (no push)
        run: docker build . --file Dockerfile --tag qa-systems-wrapper:ci
